name: Generate Changelog

on:
  push:
    branches:
      - develop
      - master
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate and Commit Changelog
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      
      - name: Generate changelog
        run: |
          # Generate changelog and save to CHANGELOG.md
          git-cliff --output CHANGELOG.md
          
          # Check if changelog was generated/updated
          if [ -f "CHANGELOG.md" ]; then
            echo "Changelog generated successfully"
          else
            echo "Failed to generate changelog"
            exit 1
          fi
      
      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit changelog
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git commit -m "chore: update changelog with git-cliff
          
          Auto-generated changelog using git-cliff based on conventional commits."
      
      - name: Push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git push origin HEAD:${{ github.ref_name }}
      
      - name: Upload changelog as artifact
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md